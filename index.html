<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0308" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="robots" content="noindex, nofollow" />
  <title>azar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <!-- Pantalla inicial -->
  <main id="home" class="screen active">
    <div class="home-glow"></div>
    <header class="brand">
      <h1>azar</h1>
      <p class="tagline">déjate llevar</p>
    </header>
    <div class="home-actions">
      <button class="card-btn" data-go="tap">
        <span class="card-icon">✷</span>
        <span class="card-title">Tocar la pantalla</span>
        <span class="card-sub">Toca y aparece una frase al azar</span>
      </button>
      <button class="card-btn secondary" data-go="add">
        <span class="card-icon">✎</span>
        <span class="card-title">Dejar una frase</span>
        <span class="card-sub">Agrega tus propias frases</span>
      </button>
    </div>
    <footer class="home-foot"><span id="count-foot">—</span> frases · +18</footer>
  </main>

  <!-- Modo tocar -->
  <section id="tap" class="screen tap-screen">
    <button class="back" data-back aria-label="Volver">←</button>

    <div class="tap-area" id="tap-area">
      <div class="tap-hint" id="tap-hint">
        <div class="pulse-ring"></div>
        <span>toca en cualquier parte</span>
      </div>
      <div class="phrase-wrap" id="phrase-wrap">
        <p class="phrase-corta" id="phrase-corta"></p>
        <p class="phrase-larga" id="phrase-larga"></p>
      </div>
    </div>
    <div class="tap-foot" id="tap-foot"></div>
  </section>

  <!-- Modo agregar -->
  <section id="add" class="screen add-screen">
    <button class="back" data-back aria-label="Volver">←</button>
    <div class="add-inner">
      <h2>Dejar frase</h2>

      <!-- Formulario -->
      <div id="add-form" class="add-form">
        <label>Acción</label>
        <input type="text" id="in-accion" placeholder="Ej: Cuello y mordidas" maxlength="80" />

        <label>En qué consiste</label>
        <textarea id="in-consiste" rows="4" placeholder="Describe con detalle..." maxlength="600"></textarea>

        <button id="add-btn" class="primary-btn">Agregar frase</button>
        <p class="add-status" id="add-status"></p>

        <details class="settings">
          <summary>Configuración de publicación</summary>
          <p class="hint">Para que tu amigo vea las frases que agregas, pega un token de GitHub (se guarda solo en este dispositivo).</p>
          <input type="password" id="gh-token" placeholder="GitHub token (ghp_… o github_pat_…)" autocomplete="off" />
          <button id="save-token" class="ghost-btn">Guardar token</button>
          <p class="hint" id="token-status"></p>
        </details>

        <div class="list-head">
          <h3>Frases actuales (<span id="count-list">0</span>)</h3>
        </div>
        <ul id="phrase-list" class="phrase-list"></ul>
      </div>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="config.js?v=3"></script>
  <script src="app.js?v=3"></script>
</body>
</html>
